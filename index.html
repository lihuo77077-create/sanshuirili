<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>轻历 QuickCal</title>
    <!-- Apple PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="轻历">
    <link rel="apple-touch-icon" href="https://api.iconify.design/lucide:calendar-days.svg?color=%233b82f6">
    <!-- Viewport must be exact to prevent scaling issues on iOS widgets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <style>
      /* 使用系统级字体族，无需请求谷歌服务器 */
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      }
      /* 防止 iOS 橡皮鞭效果 */
      body {
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
        -webkit-text-size-adjust: 100%;
      }
      #root {
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        background-color: #f8fafc;
      }
      /* 针对 iOS 安全区域的适配 */
      .safe-area-pt { padding-top: env(safe-area-inset-top); }
      .safe-area-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
